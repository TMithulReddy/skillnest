<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — SkillNest</title>
  <meta name="description" content="Real-time messaging with your skill exchange peers on SkillNest.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link rel="stylesheet" href="css/global.css">
  <style>
    /* No outer scroll — chat fills viewport below navbar */
    body { overflow: hidden; }
    #page-wrapper { visibility: hidden; }
  </style>
</head>
<body>

  <div id="page-loader">
    <div class="loader-logo">
      <svg width="40" height="40" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="#1B3A6B"/><text x="16" y="22" text-anchor="middle" font-size="18" font-family="sans-serif" fill="white" font-weight="bold">S</text></svg>
      <div class="loader-spinner"></div>
    </div>
  </div>

  <!-- ═══════════════════════
       NAVBAR-APP
       ═══════════════════════ -->
  <nav class="navbar-app">
    <a href="dashboard.html" class="navbar-app-logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      SkillNest
    </a>

    <div class="navbar-app-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="sessions.html">Sessions</a>
      <a href="chat.html" class="active">Messages</a>
    </div>

    <div class="navbar-app-right">
      <a href="credits.html" class="nav-credit-chip" id="nav-credit-link">
        ✦ <span class="js-credit-balance">—</span>
      </a>
      <a href="notifications.html" class="nav-bell" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="nav-bell-badge" id="nav-bell-badge"></span>
      </a>
      <div class="nav-avatar-wrapper">
        <button class="nav-avatar-btn" id="nav-avatar-btn" aria-label="Profile menu">
          <span class="avatar avatar-sm" id="nav-avatar">?</span>
        </button>
        <div class="nav-dropdown" id="nav-dropdown">
          <a href="my-profile.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
          <a href="settings.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
          <div class="nav-dropdown-divider"></div>
          <button class="danger" id="nav-signout-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
      <button class="navbar-app-hamburger" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ═══════════════════════
       CHAT LAYOUT
       ═══════════════════════ -->
  <div id="page-wrapper" class="chat-page">

    <!-- ─── Sidebar ─── -->
    <aside class="chat-sidebar" id="chat-sidebar">

      <div class="chat-sidebar-header">
        <span class="chat-sidebar-title">Messages</span>
        <button class="chat-compose-btn" id="compose-btn" title="New conversation" aria-label="Start new conversation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>

      <div class="chat-search">
        <input type="search" class="chat-search-input" id="conv-search" placeholder="Search conversations..." autocomplete="off" aria-label="Search conversations">
      </div>

      <div class="conversations-list" id="conversations-list">
        <!-- Skeletons while loading -->
        <div id="conv-skeleton">
          ${[1,2,3,4].map(() => `
          <div style="display:flex;gap:12px;align-items:center;padding:12px 16px;">
            <div class="skeleton skeleton-avatar" style="width:44px;height:44px;flex-shrink:0;"></div>
            <div style="flex:1;">
              <div class="skeleton skeleton-text" style="width:60%;margin-bottom:6px;"></div>
              <div class="skeleton skeleton-text" style="width:80%;height:10px;"></div>
            </div>
          </div>`).join('')}
        </div>
      </div>

    </aside>

    <!-- ─── Main Chat Panel ─── -->
    <main class="chat-main" id="chat-main">

      <!-- Empty state when no conversation selected -->
      <div class="chat-no-selection" id="chat-no-selection">
        <div class="chat-no-selection-icon">💬</div>
        <h2 style="font-size:1.1rem;font-weight:700;color:var(--color-text-primary);">Your Messages</h2>
        <p style="max-width:280px;line-height:1.6;">Select a conversation or start a new one with a peer you want to connect with.</p>
        <button class="btn btn-primary" id="start-conv-btn-empty">Start a Conversation</button>
      </div>

      <!-- Active conversation area (hidden until conversation selected) -->
      <div id="active-chat-area" style="display:none;flex-direction:column;height:100%;overflow:hidden;flex:1;">

        <!-- Chat Header -->
        <div class="chat-header" id="chat-header">
          <div class="chat-header-person">
            <button class="chat-back-btn" id="chat-back-btn" aria-label="Back to conversations">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="conv-avatar-wrap" id="header-avatar-wrap">
              <span class="avatar avatar-md" id="header-avatar">?</span>
              <span class="online-dot" id="header-online-dot" style="display:none;"></span>
            </div>
            <div class="chat-header-info">
              <a href="#" class="chat-header-name" id="header-name">—</a>
              <div class="chat-header-status" id="header-status"></div>
            </div>
          </div>
          <div class="chat-header-actions">
            <a href="#" class="btn btn-secondary" id="header-view-profile" style="padding:7px 14px;font-size:13px;">View Profile</a>
            <button class="btn btn-primary" id="header-request-session" style="padding:7px 14px;font-size:13px;">Request Session</button>
          </div>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messages-area"></div>

        <!-- Message Input Bar -->
        <div class="message-input-bar">
          <button class="emoji-btn" id="emoji-btn" aria-label="Pick emoji" title="Emoji">😊</button>
          <div class="message-textarea-wrap">
            <div class="emoji-picker" id="emoji-picker"></div>
            <textarea
              class="message-textarea"
              id="message-input"
              placeholder="Type a message..."
              maxlength="500"
              rows="1"
              aria-label="Message input"
            ></textarea>
            <div class="message-char-counter" id="char-counter">0 / 500</div>
          </div>
          <button class="send-btn" id="send-btn" disabled aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

      </div>

    </main>
  </div>

  <!-- ═══════════════════════
       NEW CONVERSATION MODAL
       ═══════════════════════ -->
  <div class="modal-backdrop" id="new-conv-modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="new-conv-title">
      <div class="modal-header">
        <h3 class="modal-title" id="new-conv-title">New Conversation</h3>
        <button class="modal-close" id="new-conv-close" aria-label="Close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom:8px;">
          <input type="search" id="new-conv-search" class="form-input" placeholder="Search by name or college..." autocomplete="off" aria-label="Search for a peer">
        </div>
        <div id="new-conv-results" style="max-height:320px;overflow-y:auto;">
          <div id="new-conv-hint" style="padding:20px;text-align:center;color:var(--color-text-secondary);font-size:0.9rem;">Start typing to search peers…</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/chat.js"></script>
</body>
</html>
